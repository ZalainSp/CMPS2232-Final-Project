<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoBites – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <div class="split">
    <div class="split-left">
      <div class="brand">
        <h1>GoBites</h1>
        <p>Fresh. Fast. Yours.</p>
        <div class="brand-line"></div>
      </div>
    </div>
    <div class="split-right">
      <div class="card">
        <h2>Welcome back</h2>
        <p class="sub">Sign in to continue ordering</p>

        <div class="role-tabs">
          <button class="role-tab active">Customer</button>
          <button class="role-tab">Manager</button>
          <button class="role-tab">Driver</button>
          <button class="role-tab">Admin</button>
        </div>

        <form class="form" autocomplete="off">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="your_username" autocomplete="off">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="show-btn">Show</button>
            </div>
          </div>
          <div class="form-extras">
            <label class="checkbox-label">
              <input type="checkbox" name="remember"> Remember me
            </label>
            <a href="#" class="link-subtle">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
          <div class="divider"><span>or</span></div>
          <button type="button" class="btn btn-ghost">Continue as Guest</button>
        </form>
        <script src="../js/login.js"></script>
        <p class="form-footer">
          Don't have an account? <a href="register.html" class="link-accent">Create one</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
