<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoBites – Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand"><span>GoBites</span></div>
      <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a href="#" style="text-decoration:none;" id="dashboard-link"><div class="nav-item">Dashboard</div></a>
        <div class="nav-label">Account</div>
        <div class="nav-item active">Settings</div>
      </nav>
      <div class="sidebar-footer">
        <div class="users-chip">
          <div class="avatar" id="users-avatar"></div>
          <div>
            <span class="users-name" id="users-name">Username</span>
            <span class="users-role">User</span>
          </div>
        </div>
        <a href="login.html"><button class="btn-icon" id="logout-btn">Out</button></a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">Settings</div>
        <button class="btn-notif" type="button">Notifications <span class="badge" id="notif-count"></span></button>
      </header>

      <div class="page">
        <div class="welcome-banner">
          <div>
            <h2 class="welcome-title">Account Settings</h2>
            <p class="welcome-sub">Manage your account preferences and security</p>
          </div>
        </div>

        <!-- Account Deactivation Section -->
        <div class="settings-section" style="margin-top:2rem;">
          <div class="section-header">
            <h3>Account Management</h3>
          </div>
          <div class="settings-card">
            <div class="setting-item">
              <div class="setting-info">
                <h4 style="margin:0 0 0.3rem 0;">Deactivate Account</h4>
                <p style="margin:0;color:var(--gray);font-size:0.9rem;">Permanently delete your account and all associated data</p>
              </div>
              <button class="btn btn-ghost" id="deactivate-btn" style="padding:0.6rem 1.4rem;color:#e74c3c;border-color:#e74c3c;">
                🗑 Deactivate
              </button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/auth-guard.js"></script>
  <script src="../js/profile-common.js"></script>
  <script src="../js/dashboard-common.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/settings.js"></script>
</body>
</html>
